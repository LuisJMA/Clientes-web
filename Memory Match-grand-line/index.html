<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grand Line Match</title>
</head>
<body>

    <!-- PANTALLA 1: MENÚ DE CONFIGURACIÓN -->
    <section id="pantalla-menu">
        <h1>🏴‍☠️ Grand Line Match 🏴‍☠️</h1>
        <h2>Configura tu Tripulación</h2>

        <!-- Usamos un <form> porque agrupa los datos de entrada y nos permite usar 
             el evento 'submit' en JavaScript para validar que todo esté lleno antes de iniciar -->
        <form id="formulario-config">
            
            <!-- Campo: Modo de Juego -->
            <div class="grupo-campo">
                <label for="modo-juego">Modo de Juego:</label>
                <!-- El <select> crea un menú desplegable. Cada <option> tiene un 'value' 
                     que coincide exactamente con lo que espera nuestro objeto gameState en JavaScript -->
                <select id="modo-juego" required>
                    <option value="solitario">Modo Solitario (Contra el reloj)</option>
                    <option value="pvp">Modo Versus (1 vs 1)</option>
                    <option value="libre">Modo Libre (Sin penalizaciones)</option>
                </select>
            </div>

            <!-- Campos: Nombres de los Jugadores -->
            <div class="grupo-campo">
                <label for="nombre-p1">Nombre del Jugador 1:</label>
                <!-- 'required' obliga al navegador a no dejar avanzar si el campo está vacío -->
                <input type="text" id="nombre-p1" required placeholder="Ej. Luffy">
            </div>

            <!-- Bloque dinámico para el Jugador 2 (Se ocultará si no se elige PvP) -->
            <div class="grupo-campo" id="bloque-jugador2" style="display: none;">
                <label for="nombre-p2">Nombre del Jugador 2:</label>
                <input type="text" id="nombre-p2" placeholder="Ej. Zoro">
            </div>

            <!-- Campo: Dificultad -->
            <div class="grupo-campo">
                <label for="dificultad">Dificultad del Mar:</label>
                <select id="dificultad" required>
                    <option value="facil">Fácil (Tablero 4x4 - 8 parejas)</option>
                    <option value="intermedio">Intermedio (Tablero 6x6 - 18 parejas)</option>
                    <option value="dificil">Difícil (Tablero 8x8 - 32 parejas)</option>
                </select>
            </div>

            <!-- Campo: Selección de Saga -->
            <div class="grupo-campo">
                <label for="saga-seleccionada">Selecciona la Saga:</label>
                <select id="saga-seleccionada" required>
                    <!-- Los values corresponden a las claves de nuestro objeto gameThemes en sagas.js -->
                    <option value="eastBlue">Saga del East Blue</option>
                    <option value="nuevoMundo">Saga del Nuevo Mundo</option>
                    <option value="yonkos">Saga de los Yonkos</option>
                </select>
            </div>

            <button type="submit">¡Iniciar Travesía!</button>
        </form>
    </section>

    <!-- PANTALLA 2: EL TABLERO DE JUEGO (Oculta al principio) -->
    <section id="pantalla-juego" style="display: none;">
        <!-- El HUD mostrará los puntos, turnos o el reloj dinámicamente -->
        <div id="hud-informacion"></div>
        
        <!-- Este contenedor vacío será la cuadrícula donde JavaScript inyectará las cartas -->
        <div id="contenedor-tablero"></div>
    </section>

    <!-- PANTALLA 3: RESUMEN / FIN DE JUEGO (Oculta al principio) -->
    <section id="pantalla-resultados" style="display: none;">
        <!-- JavaScript llenará este div con el nombre del ganador y sus estadísticas -->
        <div id="bloque-estadisticas"></div>
    </section>

    <script src="js/sagas.js"></script>
    <script src="JS/estado.js"></script>
</body>
</html>
